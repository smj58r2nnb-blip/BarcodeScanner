<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4fbf6;
      color: #1f2933;
    }

    .header {
      background: #0f8a3b;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }

    .container { padding: 12px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px #ccc;
    }

    button, input {
      width: 100%;
      font-size: 24px;
      padding: 18px;
      margin-top: 8px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    button {
      border: 0;
      color: white;
      font-weight: bold;
    }

    .scan { background: #0f8a3b; }
    .stop { background: #dc2626; display: none; }
    .save { background: #15803d; }
    .clear { background: #666; }

    video {
      width: 100%;
      display: none;
      border: 3px solid #0f8a3b;
      border-radius: 14px;
      background: black;
      margin-top: 10px;
    }

    .title {
      color: #166534;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .product {
      font-size: 26px;
      font-weight: bold;
      color: #064e3b;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .box {
      background: #ecfdf3;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #bbf7d0;
    }

    .value {
      font-size: 30px;
      font-weight: bold;
    }

    #msg {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #166534;
    }
  </style>
</head>

<body>

<div class="header">STOCK SCANNER</div>

<div class="container">

  <div class="card">
    <button id="scanBtn" class="scan" onclick="startScanner()">📷 SCAN BARCODE</button>
    <button id="stopBtn" class="stop" onclick="stopScanner()">STOP</button>

    <video id="preview" autoplay muted playsinline></video>

    <input id="barcode" onchange="lookupProduct()" placeholder="Barcode / Article No">
  </div>

  <div class="card">
    <div class="title">Product</div>
    <div id="product" class="product">Not scanned yet</div>

    <div class="grid">
      <div class="box">
        <div class="title">Qty Recorded</div>
        <div id="recordedQty" class="value">-</div>
      </div>

      <div class="box">
        <div class="title">Qty Captured</div>
        <div id="capturedQty" class="value">-</div>
      </div>

      <div class="box">
        <div class="title">Bin No</div>
        <div id="bin" class="value">-</div>
      </div>

      <div class="box">
        <div class="title">Zone</div>
        <div id="zone" class="value">-</div>
      </div>
    </div>

    <div class="box" style="margin-top:12px;">
      <div class="title">Location</div>
      <div id="location" class="value">-</div>
    </div>
  </div>

  <div class="card">
    <input id="qty" type="number" inputmode="numeric" placeholder="Qty counted">

    <button class="save" onclick="saveCount()">✅ SAVE COUNT</button>
    <button class="clear" onclick="clearForm()">Clear</button>

    <p id="msg"></p>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbycVnq0rwAamSsv-CCr78oUUpIlg1zrdnEsA1BPMst4I7d2muauLR5rhbFtDIsSEIyP/exec";

let codeReader = null;
let scanned = false;

function jsonp(url, callback) {
  const cb = "cb_" + Date.now();

  window[cb] = function(data) {
    delete window[cb];
    document.body.removeChild(script);
    callback(data);
  };

  const script = document.createElement("script");
  script.src = url + "&callback=" + cb;
  document.body.appendChild(script);
}

async function startScanner() {
  scanned = false;
  msg("Starting camera...");

  document.getElementById("preview").style.display = "block";
  document.getElementById("scanBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "block";

  const hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.CODE_128
  ]);

  codeReader = new ZXing.BrowserMultiFormatReader(hints);

  codeReader.decodeFromConstraints(
    {
      video: {
        facingMode: "environment"
      }
    },
    "preview",
    function(result, err) {
      if (result && !scanned) {
        scanned = true;

        const articleNo = result.text.trim();

        document.getElementById("barcode").value = articleNo;

        if (navigator.vibrate) {
          navigator.vibrate(150);
        }

        stopScanner();
        lookupProduct();
      }
    }
  );

  msg("Point camera at Code 128 article barcode");
}

function stopScanner() {
  if (codeReader) {
    codeReader.reset();
    codeReader = null;
  }

  document.getElementById("preview").style.display = "none";
  document.getElementById("scanBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
}

function lookupProduct() {
  const barcode = document.getElementById("barcode").value.trim();

  if (!barcode) return;

  msg("Looking up product...");

  jsonp(API_URL + "?action=find&barcode=" + encodeURIComponent(barcode), function(item) {
    if (item.found) {
      document.getElementById("product").innerText = item.description || "-";
      document.getElementById("recordedQty").innerText = item.recordedQty || "-";
      document.getElementById("capturedQty").innerText = item.capturedQty || "-";
      document.getElementById("bin").innerText = item.bin || "-";
      document.getElementById("zone").innerText = item.zone || "-";
      document.getElementById("location").innerText = item.location || "-";

      document.getElementById("qty").focus();

      msg("Product found: " + barcode);
    } else {
      msg("Barcode not found: " + barcode);
    }
  });
}

function saveCount() {
  const barcode = document.getElementById("barcode").value.trim();
  const qty = document.getElementById("qty").value;

  if (!barcode || qty === "") {
    msg("Enter barcode and quantity");
    return;
  }

  msg("Saving...");

  jsonp(
    API_URL + "?action=save&barcode=" + encodeURIComponent(barcode) + "&qty=" + encodeURIComponent(qty),
    function(res) {
      msg(res.message || "Saved");
      clearForm();
    }
  );
}

function clearForm() {
  document.getElementById("barcode").value = "";
  document.getElementById("qty").value = "";

  document.getElementById("product").innerText = "Not scanned yet";
  document.getElementById("recordedQty").innerText = "-";
  document.getElementById("capturedQty").innerText = "-";
  document.getElementById("bin").innerText = "-";
  document.getElementById("zone").innerText = "-";
  document.getElementById("location").innerText = "-";
}

function msg(text) {
  document.getElementById("msg").innerText = text;
}
</script>

</body>
</html>
