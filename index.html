<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stores Management</title>

<link rel="apple-touch-icon" href="EBF97A0E-DFD1-418E-9294-54F476B5B47F.png">
<link rel="icon" type="image/png" href="EBF97A0E-DFD1-418E-9294-54F476B5B47F.png">
<meta name="apple-mobile-web-app-title" content="Stores">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
*{box-sizing:border-box}

:root{
  --green:#16a34a;
  --bg:#eef8f0;
  --card:rgba(255,255,255,.96);
  --text:#102a1f;
  --muted:#64748b;
  --border:#d8eadf;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
}

.header{
  background:linear-gradient(135deg,#064e3b,#16a34a);
  color:white;
  text-align:center;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.header h1{
  margin:0;
  font-size:28px;
  font-weight:900;
}

.header p{
  margin-top:6px;
  font-size:14px;
  font-weight:700;
}

.wrap{
  max-width:760px;
  margin:auto;
  padding:14px;
}

/* --- RESPONSIVE PC vs MOBILE LAYOUT --- */
@media(min-width: 850px) {
  .wrap {
    max-width: 1200px;
    display: grid;
    grid-template-columns: 1fr 1fr; /* Split into 2 columns on PC */
    gap: 20px;
    align-items: start;
  }
  .card {
    margin-bottom: 0;
    height: 100%; /* Make side-by-side cards equal height */
  }
  .header {
    margin-bottom: 10px;
  }
  /* Span these sections across both columns */
  .footer {
    grid-column: 1 / -1;
  }
}

/* Make scan button less prominent on PC since USB scanners are preferred */
body.pc-view #scanBtn {
  background: linear-gradient(135deg, #475569, #64748b);
}
/* ------------------------------------- */

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

button,input,textarea,select{
  width:100%;
  font-family:inherit;
  border-radius:16px;
  padding:13px;
  font-size:16px;
  margin-top:10px;
}

input,textarea,select{
  border:2px solid var(--border);
  outline:none;
  background:white;
}

button{
  border:0;
  color:white;
  font-weight:800;
  letter-spacing:.2px;
  padding:10px 8px;
  font-size:14px;
  border-radius:14px;
  min-height:52px;
  box-shadow:0 4px 10px rgba(0,0,0,.12);
}

.scan{background:linear-gradient(135deg,#065f46,#16a34a)}
.stop{background:linear-gradient(135deg,#991b1b,#dc2626);display:none}
.save{background:linear-gradient(135deg,#15803d,#22c55e)}
.out{background:linear-gradient(135deg,#991b1b,#ef4444)}
.in{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.mode{background:linear-gradient(135deg,#111827,#334155)}
.clear{background:linear-gradient(135deg,#475569,#64748b)}

.product{
  font-size:26px;
  font-weight:900;
  margin:14px 0 12px;
  line-height:1.15;
  color:#064e3b;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(240,253,244,.9));
  border-radius:16px;
  padding:12px;
  border:1px solid #dcfce7;
}

.label{
  color:var(--muted);
  font-size:11px;
  font-weight:800;
}

.value{
  margin-top:6px;
  font-size:18px;
  font-weight:900;
  word-break:break-word;
}

.greenStock{color:#16a34a}
.amberStock{color:#f59e0b}
.redStock{color:#dc2626}

.doneBox{
  background:#dcfce7 !important;
  border:2px solid #16a34a !important;
}

.doneValue{color:#16a34a}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

video{
  width:100%;
  display:none;
  margin-top:10px;
  border-radius:16px;
  border:3px solid var(--green);
  background:black;
}

.banner{
  display:none;
  margin-top:12px;
  background:#dcfce7;
  border-radius:14px;
  padding:14px;
  text-align:center;
  font-weight:900;
}

#msg{
  text-align:center;
  font-size:16px;
  margin-top:10px;
  font-weight:800;
}

.good{color:#16a34a}
.error{color:#dc2626}

.statusBig{
  display:none;
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-size:22px;
  font-weight:900;
}

.statusSearching{
  display:block;
  background:#dbeafe;
  color:#1d4ed8;
}

.statusFound{
  display:block;
  background:#dcfce7;
  color:#15803d;
}

.statusNotFound{
  display:block;
  background:#fee2e2;
  color:#dc2626;
}

.footer{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  margin:20px 0;
}

@media(max-width:650px){
  .grid{grid-template-columns:1fr}
}

.offlineBar{
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:900;
  font-size:15px;
  background:#dcfce7;
  color:#15803d;
}
.offlineBar.offline{
  background:#fee2e2;
  color:#dc2626;
}
.offlineBar.queue{
  background:#fef3c7;
  color:#92400e;
}

.toggleRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  background:#ecfdf3;
  border:1px solid #bbf7d0;
  font-weight:900;
}
.toggleRow input{
  width:auto;
  transform:scale(1.4);
  margin:0;
}

</style>
</head>

<body>
<div class="header">
  <h1>STORES MANAGEMENT</h1>
  <p>Stock Take • Book Out • Book In</p>
</div>

<div class="wrap">

  <div class="card">
    <button id="scanBtn" class="scan" onclick="startScanner()">📷 SCAN</button>
    <button id="stopBtn" class="stop" onclick="stopScanner()">STOP</button>

    <video id="preview" autoplay muted playsinline></video>

    <input id="barcode" placeholder="Scan or enter barcode" onkeydown="manualEnter(event)">

    <div id="statusBig" class="statusBig"></div>

    <div id="product" class="product">Ready to scan</div>

    <div class="grid">
      <div class="box">
        <div class="label">📄 Article No</div>
        <div id="articleNo" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">📦 Qty Recorded</div>
        <div id="recordedQty" class="value greenStock">-</div>
      </div>

      <div class="box">
        <div id="capturedLabel" class="label">⚪ Not Counted</div>
        <div id="capturedQty" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">🗄 Bin No</div>
        <div id="bin" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">📍 Zone</div>
        <div id="zone" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">🏭 Location</div>
        <div id="location" class="value">-</div>
      </div>
    </div>

    <div id="lastMovementBox" class="box" style="display:none;margin-top:10px;">
      <div class="label">🕘 Last Movement</div>
      <div id="lastMovement" class="value">-</div>
    </div>
  </div>

  <div class="card">
    <div class="label">👤 User</div>

    <select id="user">
      <option>M Read</option>
      <option>I Rees</option>
      <option>C Law</option>
      <option>M Peters</option>
      <option>J Meakin</option>
      <option>M Goodhall</option>
    </select>

    <input id="qty" type="number" placeholder="Quantity">

    <textarea id="comments" placeholder="Comments (optional)"></textarea>

    <div class="actions">
      <button class="save" onclick="saveStockTake()">✅ SAVE</button>
      <button class="clear" onclick="clearForm()">CLEAR</button>
      <button class="in" onclick="bookIn()">📥 IN</button>
      <button class="out" onclick="bookOut()">📤 OUT</button>
    </div>

    <div id="banner" class="banner"></div>
    <div id="msg"></div>
    <div id="offlineBar" class="offlineBar">
      🟢 ONLINE
    </div>

    <button id="downloadStockBtn" class="mode" onclick="downloadStockData()">
      ⬇️ DOWNLOAD STOCK FOR OFFLINE
    </button>

    <div class="toggleRow">
      <span>📷 Continuous Scan Mode</span>
      <input id="continuousScan" type="checkbox" onchange="saveContinuousMode()">
    </div>

  </div>

  <div class="footer">
    Stores Scanner System<br>
    Supreme Compact Edition
  </div>

</div>

<script>
const API =
"https://script.google.com/macros/s/AKfycbxWl7CNDGd1OKbL7cl1hiNZ5pt46DmxG4LGcJcTmKXNWe8wLECAi0k3UMiDIzsKUwTS/exec";

let scanner = null;
let currentItem = null;
let scanLocked = false;

// --- DEVICE DETECTION LOGIC ---
function isMobileDevice() {
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 850;
}

// Apply visual mode on load and handle PC auto-focus
window.addEventListener("DOMContentLoaded", () => {
  if (isMobileDevice()) {
    document.body.classList.add('mobile-view');
  } else {
    document.body.classList.add('pc-view');
    setTimeout(() => {
      const bc = document.getElementById("barcode");
      if(bc) bc.focus();
    }, 300);
  }
});
// ------------------------------

let pendingStocktake =
  JSON.parse(
    localStorage.getItem("pendingStocktake") || "[]"
  );

function savePendingStocktakeQueue() {
  localStorage.setItem(
    "pendingStocktake",
    JSON.stringify(pendingStocktake)
  );
}

function updateOfflineBar() {
  const bar =
    document.getElementById("offlineBar");

  if (!bar) return;

  const offlineDate =
    localStorage.getItem("offlineStockDate");

  const offlineItems =
    getOfflineStockData().length;

  if (!navigator.onLine) {
    bar.className =
      "offlineBar offline";

    bar.innerHTML =
      "🔴 OFFLINE" +
      (
        offlineItems
          ? " - OFFLINE STOCK READY (" + offlineItems + " ITEMS)"
          : " - NO STOCK DOWNLOADED"
      ) +
      (
        pendingStocktake.length
          ? "<br>" + pendingStocktake.length + " STOCKTAKES QUEUED"
          : ""
      );

    return;
  }

  if (pendingStocktake.length) {
    bar.className =
      "offlineBar queue";

    bar.innerHTML =
      "🟡 ONLINE - " +
      pendingStocktake.length +
      " STOCKTAKES WAITING TO SYNC";

    return;
  }

  bar.className =
    "offlineBar";

  bar.innerHTML =
    "🟢 ONLINE" +
    (
      offlineItems
        ? "<br>Offline stock: " + offlineItems + " items" +
          (offlineDate ? " • " + offlineDate : "")
        : ""
    );
}

function queueStockTakeOffline() {
  const barcode =
    document.getElementById("barcode").value.trim();

  const qty =
    document.getElementById("qty").value;

  const who =
    document.getElementById("user").value;

  const comments =
    document.getElementById("comments").value;

  if (!barcode) {
    setMsg("Scan or enter a barcode first", "error");
    setStatus("❌ NO CODE", "statusNotFound");
    return;
  }

  if (qty === "" || Number(qty) < 0 || isNaN(Number(qty))) {
    setMsg("Enter a valid quantity", "error");
    setStatus("❌ INVALID QTY", "statusNotFound");
    return;
  }

  pendingStocktake.push({
    action: "save",
    barcode: barcode,
    qty: qty,
    who: who,
    comments: comments,
    queuedAt: new Date().toISOString()
  });

  updateOfflineItemQty(barcode, qty);

  savePendingStocktakeQueue();
  updateOfflineBar();

  showBanner(
    "📴 OFFLINE STOCKTAKE SAVED<br>" +
    pendingStocktake.length +
    " waiting to sync"
  );

  setMsg("Stocktake queued offline", "good");
  setStatus("🟡 QUEUED OFFLINE", "statusSearching");

  clearCachedItem();
  clearForm();
  maybeRestartScanner();

  if (navigator.vibrate) {
    navigator.vibrate([80, 40, 80]);
  }
}

function syncPendingStocktakes() {
  if (!navigator.onLine) {
    updateOfflineBar();
    return;
  }

  if (!pendingStocktake.length) {
    updateOfflineBar();
    return;
  }

  const item =
    pendingStocktake[0];

  const url =
    API +
    "?action=save" +
    "&barcode=" + encodeURIComponent(item.barcode) +
    "&qty=" + encodeURIComponent(item.qty) +
    "&who=" + encodeURIComponent(item.who) +
    "&comments=" + encodeURIComponent(item.comments || "");

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        pendingStocktake.shift();
        savePendingStocktakeQueue();
        updateOfflineBar();

        if (pendingStocktake.length) {
          syncPendingStocktakes();
        } else {
          showBanner("🟢 ALL OFFLINE STOCKTAKES SYNCED");
          setMsg("Offline stocktakes synced", "good");
        }
      } else {
        updateOfflineBar();
        setMsg(data.message || "Offline sync failed", "error");
      }
    })
    .catch(() => {
      updateOfflineBar();
      setMsg("Still offline - stocktakes remain queued", "error");
    });
}

window.addEventListener("online", function() {
  updateOfflineBar();
  syncPendingStocktakes();
});

window.addEventListener("offline", function() {
  updateOfflineBar();
});


function getOfflineStockData() {
  return JSON.parse(
    localStorage.getItem("offlineStockData") || "[]"
  );
}

function saveOfflineStockData(items) {
  localStorage.setItem(
    "offlineStockData",
    JSON.stringify(items)
  );

  localStorage.setItem(
    "offlineStockDate",
    new Date().toLocaleString()
  );
}

function findOfflineProduct(barcode) {
  const search =
    String(barcode || "").trim();

  const items =
    getOfflineStockData();

  for (let i = 0; i < items.length; i++) {
    if (
      String(items[i].barcode || "").trim() === search ||
      String(items[i].bin || "").trim() === search
    ) {
      return {
        found: true,
        description: items[i].description || "",
        barcode: items[i].barcode || "",
        articleNo: items[i].articleNo || "",
        make: items[i].make || "",
        recordedQty: items[i].recordedQty || "",
        capturedQty: items[i].capturedQty || "",
        bin: items[i].bin || "",
        zone: items[i].zone || "",
        location: items[i].location || "",
        lastMovement: items[i].lastMovement || null
      };
    }
  }

  return null;
}

function downloadStockData() {
  if (!navigator.onLine) {
    setMsg("Cannot download stock while offline", "error");
    setStatus("🔴 OFFLINE", "statusNotFound");
    return;
  }

  setMsg("Downloading stock for offline use...", "good");
  setStatus("⬇️ DOWNLOADING STOCK...", "statusSearching");

  fetch(API + "?action=stockdata")
    .then(r => r.json())
    .then(data => {
      if (!data.ok || !data.items) {
        setMsg(data.message || "Stock download failed", "error");
        setStatus("❌ DOWNLOAD FAILED", "statusNotFound");
        return;
      }

      saveOfflineStockData(data.items);

      showBanner(
        "✅ OFFLINE STOCK SAVED<br>" +
        data.items.length +
        " items downloaded"
      );

      setMsg(
        "Offline stock updated: " +
        data.items.length +
        " items",
        "good"
      );

      setStatus("✅ OFFLINE READY", "statusFound");
      updateOfflineBar();
    })
    .catch(() => {
      setMsg("Stock download failed", "error");
      setStatus("❌ DOWNLOAD FAILED", "statusNotFound");
    });
}

function setMsg(text, cls="") {
  const el = document.getElementById("msg");
  el.innerText = text;
  el.className = cls;
}

function setStatus(text, type) {
  const el = document.getElementById("statusBig");
  el.innerText = text;
  el.className = "statusBig " + type;
}

function showBanner(text) {
  const banner = document.getElementById("banner");
  banner.innerHTML = text;
  banner.style.display = "block";

  setTimeout(() => {
    banner.style.display = "none";
  }, 3000);
}

function manualEnter(e) {
  if (e.key === "Enter") {
    lookup(document.getElementById("barcode").value);
  }
}

function startScanner() {
  scanLocked = false;

  document.getElementById("preview").style.display = "block";
  document.getElementById("scanBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "block";

  const hints = new Map();

  hints.set(
    ZXing.DecodeHintType.POSSIBLE_FORMATS,
    [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.PDF_417
    ]
  );

  scanner = new ZXing.BrowserMultiFormatReader(hints);

  scanner.decodeFromConstraints(
    { video: { facingMode: "environment" } },
    "preview",
    function(result) {
      if (result && !scanLocked) {
        scanLocked = true;

        const code = result.text.trim();

        document.getElementById("barcode").value = code;

        if (navigator.vibrate) navigator.vibrate(150);

        stopScanner();
        lookup(code);
      }
    }
  );
}

function stopScanner() {
  if (scanner) {
    scanner.reset();
    scanner = null;
  }

  document.getElementById("preview").style.display = "none";
  document.getElementById("scanBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
}

function lookup(barcode) {
  barcode = String(barcode || "").trim();

  if (!barcode) {
    setMsg("Enter or scan a barcode", "error");
    setStatus("❌ NO CODE", "statusNotFound");

    if (navigator.vibrate) {
      navigator.vibrate([100, 50, 100]);
    }

    return;
  }

  setMsg("Searching...", "good");
  setStatus("🔎 SEARCHING...", "statusSearching");

  const cached =
    localStorage.getItem("item_" + barcode);

  if (cached) {
    showProduct(JSON.parse(cached));
  }

  if (!navigator.onLine) {
    const offlineItem =
      findOfflineProduct(barcode);

    if (offlineItem) {
      showProduct(offlineItem);
      setMsg("Offline product found", "good");
      setStatus("✅ OFFLINE FOUND", "statusFound");
    } else {
      clearProductOnly();
      setMsg("Not found in offline stock", "error");
      setStatus("❌ NOT IN OFFLINE STOCK", "statusNotFound");
    }

    updateOfflineBar();
    return;
  }

  fetch(API + "?action=find&barcode=" + encodeURIComponent(barcode))
    .then(r => r.json())
    .then(data => {
      if (data.found) {
        localStorage.setItem(
          "item_" + barcode,
          JSON.stringify(data)
        );
      }

      showProduct(data);
      updateOfflineBar();
    })
    .catch(() => {
      const offlineItem =
        findOfflineProduct(barcode);

      if (offlineItem) {
        showProduct(offlineItem);
        setMsg("Offline product found", "good");
        setStatus("✅ OFFLINE FOUND", "statusFound");
      } else {
        setMsg("Connection error", "error");
        setStatus("❌ CONNECTION ERROR", "statusNotFound");
      }

      if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100, 50, 100]);
      }

      updateOfflineBar();
    });
}

function showProduct(data) {
  if (!data.found) {
    clearProductOnly();
    setMsg("Barcode not found", "error");
    setStatus("❌ NOT FOUND", "statusNotFound");

    if (navigator.vibrate) {
      navigator.vibrate([100, 50, 100]);
    }

    return;
  }

  currentItem = data;

  document.getElementById("product").innerText = data.description || "-";
  document.getElementById("articleNo").innerText = data.articleNo || "-";
  document.getElementById("recordedQty").innerText = data.recordedQty || "-";
  document.getElementById("capturedQty").innerText = data.capturedQty || "-";
  document.getElementById("bin").innerText = data.bin || "-";
  document.getElementById("zone").innerText = data.zone || "-";
  document.getElementById("location").innerText = data.location || "-";

  setCapturedStatus(data.capturedQty);
  colourStock(data.recordedQty);
  showLastMovement(data.lastMovement);

  setMsg("Product found", "good");
  setStatus("✅ FOUND", "statusFound");

  if (navigator.vibrate) {
    navigator.vibrate(80);
  }
}

function setCapturedStatus(capturedQty) {
  const label = document.getElementById("capturedLabel");
  const qtyEl = document.getElementById("capturedQty");
  const box = qtyEl.parentElement;

  if (capturedQty) {
    label.innerText = "✅ Counted";
    qtyEl.classList.add("doneValue");
    box.classList.add("doneBox");
  } else {
    label.innerText = "⚪ Not Counted";
    qtyEl.classList.remove("doneValue");
    box.classList.remove("doneBox");
  }
}

function showLastMovement(movement) {
  const box = document.getElementById("lastMovementBox");
  const el = document.getElementById("lastMovement");

  if (!movement) {
    box.style.display = "none";
    el.innerText = "-";
    return;
  }

  box.style.display = "block";
  el.innerHTML =
    movement.action +
    " • Qty " + movement.qty +
    " • " + movement.user +
    "<br>" +
    movement.date;
}

function colourStock(qty) {
  const el = document.getElementById("recordedQty");
  const n = Number(qty);

  el.className = "value";

  if (n > 10) {
    el.classList.add("greenStock");
  } else if (n >= 5) {
    el.classList.add("amberStock");
  } else {
    el.classList.add("redStock");
  }
}

function buildUrl(action) {
  const barcode = document.getElementById("barcode").value;
  const qty = document.getElementById("qty").value;
  const comments = document.getElementById("comments").value;
  const who = document.getElementById("user").value;

  return (
    API +
    "?action=" + action +
    "&barcode=" + encodeURIComponent(barcode) +
    "&qty=" + encodeURIComponent(qty) +
    "&who=" + encodeURIComponent(who) +
    "&comments=" + encodeURIComponent(comments)
  );
}

function clearCachedItem() {
  const barcode = document.getElementById("barcode").value;
  localStorage.removeItem("item_" + barcode);
}


function updateOfflineItemQty(barcode, qty) {
  const items =
    getOfflineStockData();

  const search =
    String(barcode || "").trim();

  for (let i = 0; i < items.length; i++) {
    if (
      String(items[i].barcode || "").trim() === search ||
      String(items[i].bin || "").trim() === search
    ) {
      items[i].recordedQty = qty;
      items[i].capturedQty = qty;
      saveOfflineStockData(items);
      break;
    }
  }
}

function saveStockTake() {
  if (!navigator.onLine) {
    queueStockTakeOffline();
    return;
  }

  fetch(buildUrl("save"))
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        const savedBarcode =
          document.getElementById("barcode").value;

        const savedQty =
          document.getElementById("qty").value;

        clearCachedItem();
        updateOfflineItemQty(savedBarcode, savedQty);
        showBanner("✅ STOCK TAKE SAVED");
        lookup(savedBarcode);
        syncPendingStocktakes();
        maybeRestartScanner();
      } else {
        setMsg(data.message || "Save failed", "error");
      }
    })
    .catch(() => {
      queueStockTakeOffline();
    });
}

function bookOut() {
  fetch(buildUrl("bookout"))
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        clearCachedItem();

        showBanner(
          "📤 BOOKED OUT<br>Stock Remaining: " +
          data.stockRemaining
        );

        clearForm();
        maybeRestartScanner();
      } else {
        setMsg(data.message || "Book out failed", "error");
      }
    })
    .catch(() => setMsg("Connection error", "error"));
}

function bookIn() {
  fetch(buildUrl("bookin"))
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        clearCachedItem();

        showBanner(
          "📥 BOOKED IN<br>Stock Remaining: " +
          data.stockRemaining
        );

        clearForm();
        maybeRestartScanner();
      } else {
        setMsg(data.message || "Book in failed", "error");
      }
    })
    .catch(() => setMsg("Connection error", "error"));
}

function clearForm() {
  document.getElementById("barcode").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("comments").value = "";

  currentItem = null;

  clearProductOnly();

  // If on PC, keep the user locked to the barcode field for hand scanners
  if(!isMobileDevice()) {
    const bc = document.getElementById("barcode");
    if(bc) bc.focus();
  }
}

function clearProductOnly() {
  document.getElementById("product").innerText = "Ready to scan";
  document.getElementById("articleNo").innerText = "-";
  document.getElementById("recordedQty").innerText = "-";
  document.getElementById("capturedQty").innerText = "-";
  document.getElementById("bin").innerText = "-";
  document.getElementById("zone").innerText = "-";
  document.getElementById("location").innerText = "-";

  document.getElementById("lastMovementBox").style.display = "none";
  document.getElementById("lastMovement").innerText = "-";

  setCapturedStatus("");

  const status = document.getElementById("statusBig");
  status.innerText = "";
  status.className = "statusBig";
}

if (localStorage.getItem("continuousScan") === "yes") {
  const continuousBox = document.getElementById("continuousScan");
  if (continuousBox) continuousBox.checked = true;
}

function saveContinuousMode() {
  const on =
    document.getElementById("continuousScan").checked;

  localStorage.setItem(
    "continuousScan",
    on ? "yes" : "no"
  );

  showBanner(
    on
      ? "📷 CONTINUOUS SCAN ON"
      : "📷 CONTINUOUS SCAN OFF"
  );
}

function shouldContinuousScan() {
  return localStorage.getItem("continuousScan") === "yes";
}

function maybeRestartScanner() {
  if (shouldContinuousScan()) {
    setTimeout(startScanner, 500);
  }
}

updateOfflineBar();
syncPendingStocktakes();
</script>
</body>
</html>
