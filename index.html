<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: linear-gradient(180deg, #eaf7ee 0%, #f8fafc 100%);
      color: #102a1f;
    }

    .header {
      background: linear-gradient(135deg, #0f7a34, #16a34a);
      color: white;
      padding: 26px 16px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    .header h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.9;
      font-weight: 600;
    }

    .wrap {
      max-width: 760px;
      margin: auto;
      padding: 14px;
    }

    .card {
      background: rgba(255,255,255,0.96);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(15, 122, 52, 0.13);
      border: 1px solid #d8eadf;
    }

    button, input, textarea {
      width: 100%;
      border-radius: 16px;
      padding: 18px;
      font-size: 21px;
      margin-top: 10px;
      font-family: inherit;
    }

    input, textarea {
      border: 2px solid #c6dfcd;
      background: #ffffff;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 4px rgba(22,163,74,0.15);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    button {
      border: 0;
      color: white;
      font-weight: 900;
      letter-spacing: 0.2px;
    }
        .scan {
      background: linear-gradient(135deg, #0f7a34, #16a34a);
      font-size: 24px;
      padding: 22px;
      box-shadow: 0 6px 14px rgba(22,163,74,0.28);
    }

    .stop { background: #dc2626; display: none; }

    .save {
      background: linear-gradient(135deg, #138a3d, #22c55e);
    }

    .out {
      background: linear-gradient(135deg, #b91c1c, #ef4444);
    }

    .in {
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    }

    .clear {
      background: linear-gradient(135deg, #475569, #64748b);
    }

    video {
      width: 100%;
      display: none;
      margin-top: 14px;
      border-radius: 20px;
      border: 4px solid #16a34a;
      background: black;
    }

    .product-title {
      font-size: 13px;
      font-weight: 900;
      color: #15803d;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .product {
      font-size: 27px;
      font-weight: 900;
      color: #064e3b;
      margin: 8px 0 16px;
      line-height: 1.15;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .box {
      background: linear-gradient(180deg, #ecfdf3, #ffffff);
      border: 1px solid #bbf7d0;
      border-radius: 18px;
      padding: 14px;
      min-height: 88px;
    }

    .label {
      color: #15803d;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value {
      font-size: 20px;
      font-weight: 900;
      color: #111827;
      margin-top: 6px;
      word-break: break-word;
      line-height: 1.1;
    }
        #msg {
      min-height: 28px;
      text-align: center;
      font-size: 19px;
      font-weight: 800;
      margin-top: 10px;
    }

    .good {
      color: #16a34a;
    }

    .bad,
    .error {
      color: #dc2626;
    }

    .footer {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin: 20px 0;
      font-weight: 600;
    }

    @media(max-width:600px){

      .grid{
        grid-template-columns:1fr;
      }

      .header h1{
        font-size:26px;
      }

      .product{
        font-size:24px;
      }

      button,
      input,
      textarea{
        font-size:19px;
      }

    }

  </style>

</head>

<body>

<div class="header">
  <h1>STORES MANAGEMENT</h1>
  <p>Stock Take • Book Out • Book In</p>
</div>

<div class="wrap">

  <div class="card">

    <button id="scanBtn" class="scan" onclick="startScanner()">
      📷 SCAN QR / BARCODE
    </button>

    <button id="stopBtn" class="stop" onclick="stopScanner()">
      STOP SCANNER
    </button>

    <video id="preview" autoplay muted playsinline></video>

    <input
      id="barcode"
      placeholder="Scan or enter barcode"
      onkeydown="manualEnter(event)"
    >

  </div>
    <div class="card">

    <div class="product-title">
      Product Details
    </div>

    <div id="product" class="product">
      Ready to scan
    </div>

    <div class="grid">

      <div class="box">
        <div class="label">Article No</div>
        <div id="articleNo" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">Make</div>
        <div id="make" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">Qty Recorded</div>
        <div id="recordedQty" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">Qty Captured</div>
        <div id="capturedQty" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">Bin Number</div>
        <div id="bin" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">Zone</div>
        <div id="zone" class="value">-</div>
      </div>

    </div>

    <div class="box" style="margin-top:12px;">
      <div class="label">Location</div>
      <div id="location" class="value">-</div>
    </div>

  </div>

  <div class="card">

    <input
      id="qty"
      type="number"
      inputmode="numeric"
      placeholder="Enter quantity"
      oninput="checkQuantity()"
    >

    <textarea
      id="comments"
      placeholder="Comments (optional)"
    ></textarea>

    <button class="save" onclick="saveStockTake()">
      ✅ SAVE STOCK TAKE
    </button>

    <button class="out" onclick="bookOut()">
      📤 BOOK OUT
    </button>

    <button class="in" onclick="bookIn()">
      📥 BOOK IN
    </button>

    <button class="clear" onclick="clearForm()">
      CLEAR
    </button>

    <div id="msg"></div>

  </div>
    <div class="footer">
    Stores Scanner System
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzn6AWyiTjUU0VV5UBp-juZVOxbVuWh_C49KgON44ypNYbPhU0lo1RWaJl5MiD_H7Dz/exec";

let scanner = null;
let currentItem = null;
let scanLocked = false;

function setMsg(text, type = "") {
  const el = document.getElementById("msg");
  el.innerText = text;
  el.className = type;
}

function manualEnter(e) {
  if (e.key === "Enter") {
    lookup(document.getElementById("barcode").value);
  }
}

function startScanner() {
  scanLocked = false;

  document.getElementById("preview").style.display = "block";
  document.getElementById("scanBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "block";

  setMsg("Point camera at QR code or barcode", "good");

  const hints = new Map();

  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.CODE_39,
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.DATA_MATRIX,
    ZXing.BarcodeFormat.PDF_417
  ]);

  scanner = new ZXing.BrowserMultiFormatReader(hints);

  scanner.decodeFromConstraints(
    { video: { facingMode: "environment" } },
    "preview",
    function(result) {
      if (result && !scanLocked) {
        scanLocked = true;

        const code = result.text.trim();

        document.getElementById("barcode").value = code;

        if (navigator.vibrate) {
          navigator.vibrate(150);
        }

        stopScanner();
        lookup(code);
      }
    }
  );
}

function stopScanner() {
  if (scanner) {
    scanner.reset();
    scanner = null;
  }

  document.getElementById("preview").style.display = "none";
  document.getElementById("scanBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
}

function lookup(barcode) {
  barcode = String(barcode || "").trim();

  if (!barcode) {
    setMsg("Enter or scan a barcode.", "error");
    return;
  }

  setMsg("Looking up product...", "good");

  fetch(API + "?action=find&barcode=" + encodeURIComponent(barcode))
    .then(r => r.json())
    .then(showProduct)
    .catch(() => setMsg("Connection error", "error"));
}

function showProduct(data) {
  if (!data.found) {
    currentItem = null;
    clearProductOnly();
    setMsg("Barcode not found: " + document.getElementById("barcode").value, "error");
    return;
  }

  currentItem = data;

  document.getElementById("product").innerText = data.description || "-";
  document.getElementById("articleNo").innerText = data.articleNo || "-";
  document.getElementById("make").innerText = data.make || "-";
  document.getElementById("recordedQty").innerText = data.recordedQty || "-";
  document.getElementById("capturedQty").innerText = data.capturedQty || "-";
  document.getElementById("bin").innerText = data.bin || "-";
  document.getElementById("zone").innerText = data.zone || "-";
  document.getElementById("location").innerText = data.location || "-";

  document.getElementById("qty").focus();

  setMsg("Product found", "good");
}

function checkQuantity() {
  if (!currentItem) return;

  const value = document.getElementById("qty").value;

  if (value === "") {
    setMsg("");
    return;
  }

  const entered = Number(value);
  const recorded = Number(currentItem.recordedQty);

  if (entered === recorded) {
    setMsg("✓ Quantity matches recorded stock", "good");
  } else {
    setMsg("⚠ Quantity differs from recorded stock", "bad");
  }
}

function buildUrl(action) {
  const barcode = document.getElementById("barcode").value.trim();
  const qty = document.getElementById("qty").value;
  const comments = document.getElementById("comments").value;

  if (!barcode || qty === "") {
    setMsg("Scan a part and enter quantity.", "error");
    return null;
  }

  return API +
    "?action=" + action +
    "&barcode=" + encodeURIComponent(barcode) +
    "&qty=" + encodeURIComponent(qty) +
    "&who=" + encodeURIComponent("Matthew") +
    "&comments=" + encodeURIComponent(comments);
}

function saveStockTake() {
  const url = buildUrl("save");
  if (!url) return;

  setMsg("Saving stock take...", "good");

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        setMsg("Stock take saved", "good");
        lookup(document.getElementById("barcode").value);
      } else {
        setMsg(data.message || "Save failed", "error");
      }
    })
    .catch(() => setMsg("Connection error", "error"));
}

function bookOut() {
  const url = buildUrl("bookout");
  if (!url) return;

  setMsg("Booking out...", "good");

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        clearForm();
        setMsg("Booked out. Stock remaining: " + data.stockRemaining, "good");
        setTimeout(startScanner, 800);
      } else {
        setMsg(data.message || "Book out failed", "error");
      }
    })
    .catch(() => setMsg("Connection error", "error"));
}

function bookIn() {
  const url = buildUrl("bookin");
  if (!url) return;

  setMsg("Booking in...", "good");

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        clearForm();
        setMsg("Booked in. Stock remaining: " + data.stockRemaining, "good");
        setTimeout(startScanner, 800);
      } else {
        setMsg(data.message || "Book in failed", "error");
      }
    })
    .catch(() => setMsg("Connection error", "error"));
}

function clearForm() {
  document.getElementById("barcode").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("comments").value = "";

  currentItem = null;
  clearProductOnly();
}

function clearProductOnly() {
  document.getElementById("product").innerText = "Ready to scan";
  document.getElementById("articleNo").innerText = "-";
  document.getElementById("make").innerText = "-";
  document.getElementById("recordedQty").innerText = "-";
  document.getElementById("capturedQty").innerText = "-";
  document.getElementById("bin").innerText = "-";
  document.getElementById("zone").innerText = "-";
  document.getElementById("location").innerText = "-";
}
</script>

</body>
</html>
