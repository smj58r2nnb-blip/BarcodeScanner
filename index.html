<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stores Management</title>

<link rel="apple-touch-icon" href="EBF97A0E-DFD1-418E-9294-54F476B5B47F.png">
<link rel="icon" type="image/png" href="EBF97A0E-DFD1-418E-9294-54F476B5B47F.png">
<meta name="apple-mobile-web-app-title" content="Stores">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
*{box-sizing:border-box}

:root{
  --green:#16a34a;
  --bg:#eef8f0;
  --card:rgba(255,255,255,.96);
  --text:#102a1f;
  --muted:#64748b;
  --border:#d8eadf;
}

body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --muted:#94a3b8;
  --border:#334155;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
}

.header{
  background:linear-gradient(135deg,#064e3b,#16a34a);
  color:white;
  text-align:center;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.header h1{
  margin:0;
  font-size:28px;
  font-weight:900;
}

.header p{
  margin-top:6px;
  font-size:14px;
  font-weight:700;
}

.wrap{
  max-width:760px;
  margin:auto;
  padding:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

button,input,textarea,select{
  width:100%;
  font-family:inherit;
  border-radius:16px;
  padding:13px;
  font-size:16px;
  margin-top:10px;
}

input,textarea,select{
  border:2px solid var(--border);
  outline:none;
  background:white;
}

body.dark input,
body.dark textarea,
body.dark select{
  background:#1e293b;
  color:white;
}

button{
  border:0;
  color:white;
  font-weight:800;
  letter-spacing:.2px;
  padding:10px 8px;
  font-size:14px;
  border-radius:14px;
  min-height:52px;
  box-shadow:0 4px 10px rgba(0,0,0,.12);
}

.scan{background:linear-gradient(135deg,#065f46,#16a34a)}
.stop{background:linear-gradient(135deg,#991b1b,#dc2626);display:none}
.save{background:linear-gradient(135deg,#15803d,#22c55e)}
.out{background:linear-gradient(135deg,#991b1b,#ef4444)}
.in{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.mode{background:linear-gradient(135deg,#111827,#334155)}
.clear{background:linear-gradient(135deg,#475569,#64748b)}

.product{
  font-size:26px;
  font-weight:900;
  margin:14px 0 12px;
  line-height:1.15;
  color:#064e3b;
}

body.dark .product{color:white}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(240,253,244,.9));
  border-radius:16px;
  padding:12px;
  border:1px solid #dcfce7;
}

body.dark .box{
  background:#1e293b;
  border:1px solid #334155;
}

.label{
  color:var(--muted);
  font-size:11px;
  font-weight:800;
}

.value{
  margin-top:6px;
  font-size:18px;
  font-weight:900;
  word-break:break-word;
}

.greenStock{color:#16a34a}
.amberStock{color:#f59e0b}
.redStock{color:#dc2626}

.doneBox{
  background:#dcfce7 !important;
  border:2px solid #16a34a !important;
}

.doneValue{color:#16a34a}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

video{
  width:100%;
  display:none;
  margin-top:10px;
  border-radius:16px;
  border:3px solid var(--green);
  background:black;
}

.banner{
  display:none;
  margin-top:12px;
  background:#dcfce7;
  border-radius:14px;
  padding:14px;
  text-align:center;
  font-weight:900;
}

body.dark .banner{
  background:#14532d;
  color:white;
}

#msg{
  text-align:center;
  font-size:16px;
  margin-top:10px;
  font-weight:800;
}

.good{color:#16a34a}
.error{color:#dc2626}

.statusBig{
  display:none;
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-size:22px;
  font-weight:900;
}

.statusSearching{
  display:block;
  background:#dbeafe;
  color:#1d4ed8;
}

.statusFound{
  display:block;
  background:#dcfce7;
  color:#15803d;
}

.statusNotFound{
  display:block;
  background:#fee2e2;
  color:#dc2626;
}

.progressWrap{
  background:#e2e8f0;
  border-radius:999px;
  overflow:hidden;
  height:16px;
  margin-top:8px;
}

.progressBar{
  height:16px;
  background:#16a34a;
  width:0%;
}

.listItem{
  border-top:1px solid var(--border);
  padding:10px 0;
}

.footer{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  margin:20px 0;
}

@media(max-width:650px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="header">
  <h1>STORES MANAGEMENT</h1>
  <p>Stock Take • Book Out • Book In</p>
</div>

<div class="wrap">

  <div class="card">
    <button id="scanBtn" class="scan" onclick="startScanner()">📷 SCAN</button>
    <button id="stopBtn" class="stop" onclick="stopScanner()">STOP</button>

    <video id="preview" autoplay muted playsinline></video>

    <input id="barcode" placeholder="Scan or enter barcode" onkeydown="manualEnter(event)">

    <div id="statusBig" class="statusBig"></div>

    <div id="product" class="product">Ready to scan</div>

    <div class="grid">
      <div class="box">
        <div class="label">📄 Article No</div>
        <div id="articleNo" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">📦 Qty Recorded</div>
        <div id="recordedQty" class="value greenStock">-</div>
      </div>

      <div class="box">
        <div id="capturedLabel" class="label">⚪ Not Counted</div>
        <div id="capturedQty" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">🗄 Bin No</div>
        <div id="bin" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">📍 Zone</div>
        <div id="zone" class="value">-</div>
      </div>

      <div class="box">
        <div class="label">🏭 Location</div>
        <div id="location" class="value">-</div>
      </div>
    </div>

    <div id="lastMovementBox" class="box" style="display:none;margin-top:10px;">
      <div class="label">🕘 Last Movement</div>
      <div id="lastMovement" class="value">-</div>
    </div>
  </div>

  <div class="card">
    <div class="label">👤 User</div>

    <select id="user">
      <option>Matt Read</option>
      <option>Ivor Rees</option>
      <option>Craig Law</option>
    </select>

    <input id="qty" type="number" placeholder="Quantity">

    <textarea id="comments" placeholder="Comments (optional)"></textarea>

    <div class="actions">
      <button class="save" onclick="saveStockTake()">✅ SAVE</button>
      <button class="clear" onclick="clearForm()">CLEAR</button>
      <button class="in" onclick="bookIn()">📥 IN</button>
      <button class="out" onclick="bookOut()">📤 OUT</button>
      <button class="mode" onclick="openDashboard()">📊 DASH</button>
      <button class="mode" onclick="toggleDarkMode()">🌙 DARK</button>
    </div>

    <div id="banner" class="banner"></div>
    <div id="msg"></div>
  </div>

  <div id="dashboardCard" class="card" style="display:none">
    <div class="product">📊 Dashboard</div>
    <div id="dashboardContent"></div>
  </div>

  <div class="footer">
    Stores Scanner System<br>
    Supreme Compact Edition
  </div>

</div>

<script>
const API =
"https://script.google.com/macros/s/AKfycbzn6AWyiTjUU0VV5UBp-juZVOxbVuWh_C49KgON44ypNYbPhU0lo1RWaJl5MiD_H7Dz/exec";

let scanner = null;
let currentItem = null;
let scanLocked = false;

if (localStorage.getItem("darkMode") === "yes") {
  document.body.classList.add("dark");
}

function setMsg(text, cls="") {
  const el = document.getElementById("msg");
  el.innerText = text;
  el.className = cls;
}

function setStatus(text, type) {
  const el = document.getElementById("statusBig");
  el.innerText = text;
  el.className = "statusBig " + type;
}

function showBanner(text) {
  const banner = document.getElementById("banner");
  banner.innerHTML = text;
  banner.style.display = "block";

  setTimeout(() => {
    banner.style.display = "none";
  }, 3000);
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");

  localStorage.setItem(
    "darkMode",
    document.body.classList.contains("dark") ? "yes" : "no"
  );
}

function manualEnter(e) {
  if (e.key === "Enter") {
    lookup(document.getElementById("barcode").value);
  }
}

function startScanner() {
  scanLocked = false;

  document.getElementById("preview").style.display = "block";
  document.getElementById("scanBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "block";

  const hints = new Map();

  hints.set(
    ZXing.DecodeHintType.POSSIBLE_FORMATS,
    [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.PDF_417
    ]
  );

  scanner = new ZXing.BrowserMultiFormatReader(hints);

  scanner.decodeFromConstraints(
    { video: { facingMode: "environment" } },
    "preview",
    function(result) {
      if (result && !scanLocked) {
        scanLocked = true;

        const code = result.text.trim();

        document.getElementById("barcode").value = code;

        if (navigator.vibrate) navigator.vibrate(150);

        stopScanner();
        lookup(code);
      }
    }
  );
}

function stopScanner() {
  if (scanner) {
    scanner.reset();
    scanner = null;
  }

  document.getElementById("preview").style.display = "none";
  document.getElementById("scanBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
}

function lookup(barcode) {
  barcode = String(barcode || "").trim();

  if (!barcode) {
    setMsg("Enter or scan a barcode", "error");
    setStatus("❌ NO CODE", "statusNotFound");

    if (navigator.vibrate) {
      navigator.vibrate([100, 50, 100]);
    }

    return;
  }

  setMsg("Searching...", "good");
  setStatus("🔎 SEARCHING...", "statusSearching");

  const cached = localStorage.getItem("item_" + barcode);

  if (cached) {
    showProduct(JSON.parse(cached));
  }

  fetch(API + "?action=find&barcode=" + encodeURIComponent(barcode))
    .then(r => r.json())
    .then(data => {
      if (data.found) {
        localStorage.setItem(
          "item_" + barcode,
          JSON.stringify(data)
        );
      }

      showProduct(data);
    })
    .catch(() => {
      setMsg("Connection error", "error");
      setStatus("❌ CONNECTION ERROR", "statusNotFound");

      if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100, 50, 100]);
      }
    });
}

function showProduct(data) {
  if (!data.found) {
    clearProductOnly();
    setMsg("Barcode not found", "error");
    setStatus("❌ NOT FOUND", "statusNotFound");

    if (navigator.vibrate) {
      navigator.vibrate([100, 50, 100]);
    }

    return;
  }

  currentItem = data;

  document.getElementById("product").innerText = data.description || "-";
  document.getElementById("articleNo").innerText = data.articleNo || "-";
  document.getElementById("recordedQty").innerText = data.recordedQty || "-";
  document.getElementById("capturedQty").innerText = data.capturedQty || "-";
  document.getElementById("bin").innerText = data.bin || "-";
  document.getElementById("zone").innerText = data.zone || "-";
  document.getElementById("location").innerText = data.location || "-";

  setCapturedStatus(data.capturedQty);
  colourStock(data.recordedQty);
  showLastMovement(data.lastMovement);

  setMsg("Product found", "good");
  setStatus("✅ FOUND", "statusFound");

  if (navigator.vibrate) {
    navigator.vibrate(80);
  }
}

function setCapturedStatus(capturedQty) {
  const label = document.getElementById("capturedLabel");
  const qtyEl = document.getElementById("capturedQty");
  const box = qtyEl.parentElement;

  if (capturedQty) {
    label.innerText = "✅ Counted";
    qtyEl.classList.add("doneValue");
    box.classList.add("doneBox");
  } else {
    label.innerText = "⚪ Not Counted";
    qtyEl.classList.remove("doneValue");
    box.classList.remove("doneBox");
  }
}

function showLastMovement(movement) {
  const box = document.getElementById("lastMovementBox");
  const el = document.getElementById("lastMovement");

  if (!movement) {
    box.style.display = "none";
    el.innerText = "-";
    return;
  }

  box.style.display = "block";
  el.innerHTML =
    movement.action +
    " • Qty " + movement.qty +
    " • " + movement.user +
    "<br>" +
    movement.date;
}

function colourStock(qty) {
  const el = document.getElementById("recordedQty");
  const n = Number(qty);

  el.className = "value";

  if (n > 10) {
    el.classList.add("greenStock");
  } else if (n >= 5) {
    el.classList.add("amberStock");
  } else {
    el.classList.add("redStock");
  }
}

function buildUrl(action) {
  const barcode = document.getElementById("barcode").value;
  const qty = document.getElementById("qty").value;
  const comments = document.getElementById("comments").value;
  const who = document.getElementById("user").value;

  return (
    API +
    "?action=" + action +
    "&barcode=" + encodeURIComponent(barcode) +
    "&qty=" + encodeURIComponent(qty) +
    "&who=" + encodeURIComponent(who) +
    "&comments=" + encodeURIComponent(comments)
  );
}

function clearCachedItem() {
  const barcode = document.getElementById("barcode").value;
  localStorage.removeItem("item_" + barcode);
}

function saveStockTake() {
  fetch(buildUrl("save"))
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        clearCachedItem();
        showBanner("✅ STOCK TAKE SAVED");
        lookup(document.getElementById("barcode").value);
      } else {
        setMsg(data.message || "Save failed", "error");
      }
    })
    .catch(() => setMsg("Connection error", "error"));
}

function bookOut() {
  fetch(buildUrl("bookout"))
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        clearCachedItem();

        showBanner(
          "📤 BOOKED OUT<br>Stock Remaining: " +
          data.stockRemaining
        );

        clearForm();
        setTimeout(startScanner, 800);
      } else {
        setMsg(data.message || "Book out failed", "error");
      }
    })
    .catch(() => setMsg("Connection error", "error"));
}

function bookIn() {
  fetch(buildUrl("bookin"))
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        clearCachedItem();

        showBanner(
          "📥 BOOKED IN<br>Stock Remaining: " +
          data.stockRemaining
        );

        clearForm();
        setTimeout(startScanner, 800);
      } else {
        setMsg(data.message || "Book in failed", "error");
      }
    })
    .catch(() => setMsg("Connection error", "error"));
}

function openDashboard() {
  fetch(API + "?action=dashboard")
    .then(r => r.json())
    .then(data => {
      if (!data.ok) {
        setMsg("Dashboard failed", "error");
        return;
      }

      const stocktake = data.stocktake || {
        total: 0,
        counted: 0,
        remaining: 0,
        percent: 0
      };

      const last = data.lastMovement;

      let html = `
        <div class="grid">

          <div class="box">
            <div class="label">📤 Out Today</div>
            <div class="value">${data.bookedOutToday}</div>
          </div>

          <div class="box">
            <div class="label">📥 In Today</div>
            <div class="value">${data.bookedInToday}</div>
          </div>

          <div class="box">
            <div class="label">📤 Out This Month</div>
            <div class="value">${data.bookedOutMonth}</div>
          </div>

          <div class="box">
            <div class="label">📥 In This Month</div>
            <div class="value">${data.bookedInMonth}</div>
          </div>

        </div>

        <div class="box" style="margin-top:10px;">
          <div class="label">📦 Stocktake Progress</div>
          <div class="value">${stocktake.percent}%</div>

          <div class="progressWrap">
            <div
              class="progressBar"
              style="width:${stocktake.percent}%">
            </div>
          </div>

          <div style="margin-top:8px;font-size:13px;">
            Counted: ${stocktake.counted}
            • Remaining: ${stocktake.remaining}
            • Total: ${stocktake.total}
          </div>
        </div>
      `;

      if (last) {
        html += `
          <div class="box" style="margin-top:10px;">
            <div class="label">🕘 Last Movement</div>
            <div class="value">${last.action} • Qty ${last.qty}</div>

            <div style="font-size:13px;margin-top:6px;">
              ${last.description}<br>
              ${last.user} • ${last.date}
            </div>
          </div>
        `;
      }

      html += `
        <div class="box" style="margin-top:10px;">
          <div class="label">🔥 Most Used Parts</div>
      `;

      (data.topParts || []).forEach((p, i) => {
        html += `
          <div class="listItem">
            ${i + 1}. ${p.description}<br>
            <strong>Qty used: ${p.qty}</strong>
          </div>
        `;
      });

      html += `</div>`;

      html += `
        <div class="box" style="margin-top:10px;">
          <div class="label">👤 Usage Statistics</div>
      `;

      (data.topUsers || []).forEach((u, i) => {
        html += `
          <div class="listItem">
            ${i + 1}. ${u.name}<br>
            <strong>Qty booked out: ${u.qty}</strong>
          </div>
        `;
      });

      html += `</div>`;

      document.getElementById("dashboardContent").innerHTML = html;
      document.getElementById("dashboardCard").style.display = "block";

      document.getElementById("dashboardCard").scrollIntoView({
        behavior: "smooth"
      });
    })
    .catch(() => setMsg("Dashboard connection error", "error"));
}

function clearForm() {
  document.getElementById("barcode").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("comments").value = "";

  currentItem = null;

  clearProductOnly();
}

function clearProductOnly() {
  document.getElementById("product").innerText = "Ready to scan";
  document.getElementById("articleNo").innerText = "-";
  document.getElementById("recordedQty").innerText = "-";
  document.getElementById("capturedQty").innerText = "-";
  document.getElementById("bin").innerText = "-";
  document.getElementById("zone").innerText = "-";
  document.getElementById("location").innerText = "-";

  document.getElementById("lastMovementBox").style.display = "none";
  document.getElementById("lastMovement").innerText = "-";

  setCapturedStatus("");

  const status = document.getElementById("statusBig");
  status.innerText = "";
  status.className = "statusBig";
}
</script>
</body>
</html>
