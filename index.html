<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stores Management</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
* { box-sizing: border-box; }
:root { --green: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; --border: #e2e8f0; }

body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding-bottom: 40px; }

/* Layout Grid */
.header { background: linear-gradient(135deg, #047857, #10b981); color: white; padding: 24px; text-align: center; }
.wrap { max-width: 1200px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 20px; }
@media(min-width: 900px) { .wrap { grid-template-columns: 1fr 1fr; } .full-width { grid-column: 1 / -1; } }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; }

/* Professional Scanner UI */
.scanner-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: black; display: none; margin-top: 10px; }
#preview { width: 100%; display: block; }

/* The Scanner "Target Box" */
.scanner-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; border: 2px solid rgba(255,255,255,0.3);
}
.scanner-overlay::after {
  content: ""; position: absolute; top: 20%; left: 20%; width: 60%; height: 60%;
  border: 4px solid var(--green); border-radius: 8px; box-shadow: 0 0 0 999px rgba(0,0,0,0.5);
}

.data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; flex-grow: 1; }
.box { background: var(--bg); border-radius: 10px; padding: 16px; border: 1px solid var(--border); }
.value { font-size: 20px; font-weight: 800; }
.label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; }

button { min-height: 48px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: white; }
input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 10px; margin-top: 10px; }
</style>
</head>

<body>
<header class="header"><h1>STORES MANAGEMENT</h1></header>

<main class="wrap">
  <section class="card">
    <button id="scanBtn" class="scan" style="background:var(--green)" onclick="startScanner()">📷 OPEN CAMERA</button>
    <button id="stopBtn" class="stop" style="background:#e11d48; display:none;" onclick="stopScanner()">STOP SCANNING</button>
    
    <div id="scanner-container" class="scanner-container">
      <video id="preview"></video>
      <div class="scanner-overlay"></div>
    </div>

    <input id="barcode" placeholder="Scan or type barcode..." onkeydown="manualEnter(event)">
    <div id="product" style="font-weight:800; font-size:20px; margin-top:20px;">Ready to scan</div>

    <div class="data-grid">
      <div class="box"><div class="label">Article No</div><div id="articleNo" class="value">-</div></div>
      <div class="box"><div class="label">Qty Recorded</div><div id="recordedQty" class="value">-</div></div>
      <div class="box"><div class="label">Not Counted</div><div id="capturedQty" class="value">-</div></div>
      <div class="box"><div class="label">Bin No</div><div id="bin" class="value">-</div></div>
    </div>
  </section>

  <section class="card">
    <select id="user"><option>M Read</option><option>I Rees</option><option>C Law</option></select>
    <input id="qty" type="number" placeholder="Quantity">
    <textarea id="comments" placeholder="Comments..." style="margin-top:10px; width:100%"></textarea>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top: 20px;">
        <button class="save" onclick="saveStockTake()">✓ Save</button>
        <button class="clear" style="background:#94a3b8" onclick="clearForm()">✕ Clear</button>
        <button class="in" onclick="bookIn()">↓ Book In</button>
        <button class="out" onclick="bookOut()">↑ Book Out</button>
    </div>
  </section>
</main>

<script>
// Your existing functions remain here...
function startScanner() {
  document.getElementById("scanner-container").style.display = "block";
  document.getElementById("scanBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "block";
  // ... rest of ZXing logic
}

function stopScanner() {
  document.getElementById("scanner-container").style.display = "none";
  document.getElementById("scanBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
  // ... rest of ZXing logic
}
</script>
</body>
</html>
