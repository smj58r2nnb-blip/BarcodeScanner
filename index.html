<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef8f0;
      color: #123524;
    }

    .header {
      background: #138a3d;
      color: white;
      text-align: center;
      padding: 22px 10px;
      font-size: 30px;
      font-weight: 800;
    }

    .wrap {
      max-width: 720px;
      margin: auto;
      padding: 12px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
    }

    button, input {
      width: 100%;
      border-radius: 14px;
      padding: 18px;
      font-size: 22px;
      margin-top: 10px;
    }

    button {
      border: 0;
      color: white;
      font-weight: 800;
    }

    input {
      border: 2px solid #b7d7c2;
    }

    .scan, .save { background: #138a3d; }
    .stop { background: #d93025; display: none; }
    .clear { background: #6b7280; }

    video {
      width: 100%;
      display: none;
      margin-top: 12px;
      border-radius: 16px;
      border: 4px solid #138a3d;
      background: black;
    }

    .title {
      font-size: 14px;
      font-weight: 800;
      color: #166534;
      text-transform: uppercase;
    }

    .product {
      font-size: 28px;
      font-weight: 800;
      color: #064e3b;
      margin-bottom: 12px;
      line-height: 1.15;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .box {
      background: #ecfdf3;
      border: 2px solid #bdf2cc;
      border-radius: 14px;
      padding: 14px;
      min-height: 88px;
    }

    .label {
      color: #166534;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .value {
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      margin-top: 6px;
      word-break: break-word;
      line-height: 1.1;
    }

    #msg {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: #166534;
      min-height: 28px;
    }

    .error { color: #d93025 !important; }
    .good { color: #138a3d !important; }
    .bad { color: #d93025 !important; }
  </style>
</head>

<body>
<div class="header">STOCK SCANNER</div>

<div class="wrap">

  <div class="card">
    <button id="scanBtn" class="scan" onclick="startScanner()">📷 SCAN QR / BARCODE</button>
    <button id="stopBtn" class="stop" onclick="stopScanner()">STOP SCANNER</button>
    <video id="preview" autoplay muted playsinline></video>
    <input id="barcode" placeholder="Barcode" onkeydown="manualEnter(event)">
  </div>

  <div class="card">
    <div class="title">Product</div>
    <div id="product" class="product">Ready to scan</div>

    <div class="grid">
      <div class="box"><div class="label">Article No</div><div id="articleNo" class="value">-</div></div>
      <div class="box"><div class="label">Make</div><div id="make" class="value">-</div></div>
      <div class="box"><div class="label">Qty Recorded</div><div id="recordedQty" class="value">-</div></div>
      <div class="box"><div class="label">Qty Captured</div><div id="capturedQty" class="value">-</div></div>
      <div class="box"><div class="label">Bin No</div><div id="bin" class="value">-</div></div>
      <div class="box"><div class="label">Zone</div><div id="zone" class="value">-</div></div>
    </div>

    <div class="box" style="margin-top:10px;">
      <div class="label">Location</div>
      <div id="location" class="value">-</div>
    </div>
  </div>

  <div class="card">
    <input id="qty" type="number" inputmode="numeric" placeholder="Qty counted" oninput="checkQuantity()">
    <button class="save" onclick="saveCount()">✅ SAVE COUNT</button>
    <button class="clear" onclick="clearForm()">CLEAR</button>
    <p id="msg"></p>
  </div>

</div>
<script>

const API =
"https://script.google.com/macros/s/AKfycbw2M7ME-75gvRSI4xA3PyEvO9mo0b2kfEj48hXVl0_dEmCeLd5SIE_Ce4VaLWIyH8yo/exec";

let scanner;

function manualEnter(e){
  if(e.key==="Enter"){
    lookup(document.getElementById("barcode").value);
  }
}

function startScanner(){

  document.getElementById("preview").style.display="block";
  document.getElementById("scanBtn").style.display="none";
  document.getElementById("stopBtn").style.display="block";

  scanner = new ZXing.BrowserMultiFormatReader();

  scanner.decodeFromVideoDevice(
    null,
    "preview",
    (result)=>{
      if(result){
        stopScanner();
        document.getElementById("barcode").value=result.text;
        lookup(result.text);
      }
    }
  );
}

function stopScanner(){

  if(scanner){
    scanner.reset();
  }

  document.getElementById("preview").style.display="none";
  document.getElementById("scanBtn").style.display="block";
  document.getElementById("stopBtn").style.display="none";
}


function lookup(barcode){

  document.getElementById("msg").innerHTML="Looking up product...";

  const url =
  API +
  "?action=find" +
  "&barcode=" +
  encodeURIComponent(barcode);

  fetch(url)
  .then(r=>r.json())
  .then(showProduct)
  .catch(()=>{
    msg("Connection error",true);
  });

}


function showProduct(data){

  if(!data.found){

    msg("Barcode not found : "+document.getElementById("barcode").value,true);
    return;

  }

  document.getElementById("product").innerHTML=data.description;
  document.getElementById("articleNo").innerHTML=data.articleNo||"-";
  document.getElementById("make").innerHTML=data.make||"-";
  document.getElementById("recordedQty").innerHTML=data.recordedQty||"-";
  document.getElementById("capturedQty").innerHTML=data.capturedQty||"-";
  document.getElementById("bin").innerHTML=data.bin||"-";
  document.getElementById("zone").innerHTML=data.zone||"-";
  document.getElementById("location").innerHTML=data.location||"-";

  checkQuantity();

  msg("Product found");
}


function checkQuantity(){

  let recorded =
    Number(document.getElementById("recordedQty").innerHTML);

  let counted =
    Number(document.getElementById("qty").value);

  let m = document.getElementById("msg");

  if(!counted)return;

  if(counted===recorded){
    m.className="good";
    m.innerHTML="✓ Quantity correct";
  }
  else{
    m.className="bad";
    m.innerHTML="⚠ Quantity mismatch";
  }

}


function saveCount(){

  let barcode=document.getElementById("barcode").value;
  let qty=document.getElementById("qty").value;

  if(!qty){
    msg("Enter quantity",true);
    return;
  }

  fetch(
    API+
    "?action=save"+
    "&barcode="+encodeURIComponent(barcode)+
    "&qty="+encodeURIComponent(qty)
  )
  .then(r=>r.json())
  .then(data=>{

    if(data.ok){
      msg("Saved successfully");
      lookup(barcode);
    }
    else{
      msg(data.message,true);
    }

  });

}


function clearForm(){

  document.getElementById("barcode").value="";
  document.getElementById("qty").value="";

  document.getElementById("product").innerHTML="Ready to scan";

  document.getElementById("articleNo").innerHTML="-";
  document.getElementById("make").innerHTML="-";
  document.getElementById("recordedQty").innerHTML="-";
  document.getElementById("capturedQty").innerHTML="-";
  document.getElementById("bin").innerHTML="-";
  document.getElementById("zone").innerHTML="-";
  document.getElementById("location").innerHTML="-";

  msg("");
}


function msg(text,error=false){

  let m=document.getElementById("msg");

  m.innerHTML=text;

  if(error){
    m.className="error";
  }
  else{
    m.className="good";
  }

}

</script>

</body>
