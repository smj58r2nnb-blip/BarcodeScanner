<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stores Management</title>
<link rel="apple-touch-icon" href="EBF97A0E-DFD1-418E-9294-54F476B5B47F.png">
<link rel="icon" type="image/png" href="EBF97A0E-DFD1-418E-9294-54F476B5B47F.png">
<meta name="apple-mobile-web-app-title" content="Stores">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
*{box-sizing:border-box}

:root{
  --green:#16a34a; --bg:#eef8f0; --card:rgba(255,255,255,.96);
  --text:#102a1f; --muted:#64748b; --border:#d8eadf;
}

body.dark{
  --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --muted:#94a3b8; --border:#334155;
}

body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
}

.header{
  background:linear-gradient(135deg,#064e3b,#16a34a);
  color:white; text-align:center; padding:20px;
}

.wrap{ max-width:760px; margin:auto; padding:14px; }

/* Responsive Layout */
@media(min-width: 800px) {
  .wrap { max-width: 1200px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .full-width { grid-column: 1 / -1; }
}

.card{
  background:var(--card); border:1px solid var(--border);
  border-radius:18px; padding:14px; margin-bottom:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

button,input,textarea,select{
  width:100%; font-family:inherit; border-radius:16px;
  padding:13px; font-size:16px; margin-top:10px; border:2px solid var(--border);
}

button{
  border:0; color:white; font-weight:800; padding:10px 8px;
  min-height:52px; cursor:pointer;
}

.scan{background:linear-gradient(135deg,#065f46,#16a34a)}
.stop{background:linear-gradient(135deg,#991b1b,#dc2626);display:none}
.save{background:linear-gradient(135deg,#15803d,#22c55e)}
.out{background:linear-gradient(135deg,#991b1b,#ef4444)}
.in{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.mode{background:linear-gradient(135deg,#111827,#334155)}
.clear{background:linear-gradient(135deg,#475569,#64748b)}

.grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
.box{ background:white; border-radius:16px; padding:12px; border:1px solid var(--border); }
body.dark .box{ background:#1e293b; }
.label{ color:var(--muted); font-size:11px; font-weight:800; }
.value{ font-size:18px; font-weight:900; }
video{ width:100%; display:none; border-radius:16px; border:3px solid var(--green); }
.statusBig{ display:none; padding:14px; border-radius:14px; text-align:center; font-weight:900; }
.offlineBar{ margin-top:12px; padding:14px; border-radius:14px; text-align:center; font-weight:900; background:#dcfce7; color:#15803d; }

</style>
</head>

<body>
<div class="header">
  <h1>STORES MANAGEMENT</h1>
</div>

<div class="wrap">
  <div class="card">
    <button id="scanBtn" class="scan" onclick="startScanner()">📷 SCAN</button>
    <button id="stopBtn" class="stop" onclick="stopScanner()">STOP</button>
    <video id="preview" autoplay muted playsinline></video>
    <input id="barcode" placeholder="Scan or enter barcode" onkeydown="manualEnter(event)">
    <div id="statusBig" class="statusBig"></div>
    <div id="product" class="product" style="font-weight:900; margin:10px 0;">Ready to scan</div>
    <div class="grid" id="dataGrid">
       </div>
  </div>

  <div class="card">
    <select id="user"><option>M Read</option><option>I Rees</option><option>C Law</option></select>
    <input id="qty" type="number" placeholder="Quantity">
    <div class="grid">
      <button class="save" onclick="saveStockTake()">✅ SAVE</button>
      <button class="clear" onclick="clearForm()">CLEAR</button>
      <button class="in" onclick="bookIn()">📥 IN</button>
      <button class="out" onclick="bookOut()">📤 OUT</button>
    </div>
    <div id="offlineBar" class="offlineBar">🟢 ONLINE</div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz0gLP4GPiWjUXhCx8ssO70-MU5G5LKf8S0xmwoidHHgxzs_GLvN_AY8tsQrWV9d0fS/exec";

function isMobile() {
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 800;
}

function manualEnter(e) {
  if (e.key === "Enter") lookup(document.getElementById("barcode").value);
}

function startScanner() {
  if (!isMobile()) {
    alert("Please use the barcode scanner hardware.");
    document.getElementById("barcode").focus();
    return;
  }
  // ... existing ZXing logic ...
  document.getElementById("preview").style.display = "block";
}

function stopScanner() { /* ... existing stop logic ... */ }

// Auto-focus logic for better PC experience
function clearForm() {
  document.getElementById("barcode").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("barcode").focus(); // Keeps hands on scanner
}

// Initialize
document.getElementById("barcode").focus();
</script>
</body>
</html>
