<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stores Management</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* ... Keep all your existing CSS from your current index.html ... */
    #reader { width: 100%; display: none; margin-bottom: 20px; border-radius: 12px; overflow: hidden; }
  </style>
</head>
<body>
  <div id="reader"></div>
  <button id="scanBtn" class="scan" onclick="startInlineScanner()">📷 START CAMERA SCAN</button>
  <button id="stopBtn" class="scan" style="background:#dc2626; display:none;" onclick="stopInlineScanner()">❌ STOP SCANNER</button>

  <script>
    // REPLACE THIS URL WITH YOUR NEW DEPLOYED WEB APP URL
    const API = "https://script.google.com/macros/s/AKfycbxdLzxMvXUx1rPJ7WO6DPkl8z-5n7vwmxeLMSo-1ZspYtiqN9xERcBU9D0dY0fRVMlg/exec";

    let html5QrCode;
    function startInlineScanner() {
      document.getElementById("reader").style.display = "block";
      document.getElementById("scanBtn").style.display = "none";
      document.getElementById("stopBtn").style.display = "inline-flex";
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
        document.getElementById("barcode").value = decodedText;
        lookup(decodedText);
        stopInlineScanner();
      });
    }

    function stopInlineScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          document.getElementById("reader").style.display = "none";
          document.getElementById("scanBtn").style.display = "inline-flex";
          document.getElementById("stopBtn").style.display = "none";
        });
      }
    }
    
    // ... Keep all your other existing JavaScript functions below ...
  </script>
</body>
</html>
